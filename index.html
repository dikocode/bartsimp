<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body { margin: 0; background: #111; overflow: hidden; font-family: sans-serif; }
    canvas { display: block; margin: 0 auto; background: #222; }
    
    /* UI Layout */
    #mobile-controls {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
      pointer-events: none; /* lets clicks pass through wrapper */
    }
    
    .btn-group { display: flex; gap: 15px; }
    
    .ctrl-btn {
      width: 70px;
      height: 70px;
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      color: #fff;
      font-size: 24px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation; /* stops zoom delay */
      pointer-events: auto;
    }
    
    .ctrl-btn:active { background: rgba(255, 255, 255, 0.5); }
    
    /* hide mobile ui on desktop layout */
    @media (pointer: fine) {
      #mobile-controls { display: none; }
    }
  </style>
</head>
<body>

  <canvas id="gameCanvas"></canvas>

  <!-- Mobile Overlay -->
  <div id="mobile-controls">
    <div class="btn-group">
      <div id="btn-left" class="ctrl-btn">◀</div>
      <div id="btn-right" class="ctrl-btn">▶</div>
    </div>
    <div id="btn-jump" class="ctrl-btn">▲</div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas')
    const ctx = canvas.getContext('2d')

    canvas.width = 800
    canvas.height = 400

    // State setup
    const input = { left: false, right: false, jump: false }
    const gravity = 0.5

    const player = {
      x: 100,
      y: 300,
      width: 32,
      height: 32,
      speed: 5,
      jumpForce: 12,
      velocityY: 0,
      grounded: false
    }

    const boss = {
      x: 600,
      y: 250,
      width: 80,
      height: 80,
      hp: 100
    }

    // PC Inputs
    window.addEventListener('keydown', (e) => {
      if (e.key === 'a' || e.key === 'ArrowLeft') input.left = true
      if (e.key === 'd' || e.key === 'ArrowRight') input.right = true
      if (e.key === 'w' || e.key === 'ArrowUp' || e.key === ' ') input.jump = true
    })

    window.addEventListener('keyup', (e) => {
      if (e.key === 'a' || e.key === 'ArrowLeft') input.left = false
      if (e.key === 'd' || e.key === 'ArrowRight') input.right = false
      if (e.key === 'w' || e.key === 'ArrowUp' || e.key === ' ') input.jump = false
    })

    // Mobile Inputs split into functions to map listeners fast
    function bindTouch(elementId, inputProperty) {
      const el = document.getElementById(elementId)
      el.addEventListener('touchstart', (e) => {
        e.preventDefault()
        input[inputProperty] = true
      })
      el.addEventListener('touchend', (e) => {
        e.preventDefault()
        input[inputProperty] = false
      })
    }

    bindTouch('btn-left', 'left')
    bindTouch('btn-right', 'right')
    bindTouch('btn-jump', 'jump')

    // Physics + Loop
    function update() {
      // Horizontal motion
      if (input.left) player.x -= player.speed
      if (input.right) player.x += player.speed

      // Vertical motion
      player.velocityY += gravity
      player.y += player.velocityY

      // Screen boundary constraints
      if (player.x < 0) player.x = 0
      if (player.x > canvas.width - player.width) player.x = canvas.width - player.width

      // Floor collision check
      const floorLevel = canvas.height - 50
      if (player.y + player.height >= floorLevel) {
        player.y = floorLevel - player.height
        player.velocityY = 0
        player.grounded = true
      }

      // Execute jump triggered from keys or touch overlay
      if (input.jump && player.grounded) {
        player.velocityY = -player.jumpForce
        player.grounded = false
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height)

      // Floor
      ctx.fillStyle = '#444'
      ctx.fillRect(0, canvas.height - 50, canvas.width, 50)

      // Player
      ctx.fillStyle = '#00ffcc'
      ctx.fillRect(player.x, player.y, player.width, player.height)

      // Boss
      ctx.fillStyle = '#ff3333'
      ctx.fillRect(boss.x, boss.y, boss.width, boss.height)
    }

    function loop() {
      update()
      draw()
      requestAnimationFrame(loop)
    }

    loop()
  </script>
</body>
</html>
