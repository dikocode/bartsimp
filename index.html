<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bart Escape</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: #fff;
            font-family: 'Arial Black', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 95vw;
            max-width: 800px;
            aspect-ratio: 2 / 1;
        }
        canvas {
            background: #222;
            border: 4px solid #fff;
            display: block;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
        }
        #score-board {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            text-shadow: 3px 3px #000;
            z-index: 10;
            color: #FFD90F;
        }
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
        }
        button {
            padding: 12px 30px;
            font-size: 20px;
            font-family: inherit;
            background: #FFD90F;
            color: #000;
            border: none;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.2s;
        }
        button:hover {
            transform: scale(1.1);
        }
        #audio-status {
            font-size: 12px;
            color: #ff5555;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="score-board">SCORE: 0</div>
    <div id="start-screen">
        <h1 style="color: #FFD90F; margin-bottom: 10px; font-size: min(6vw, 36px);">BART SIMPSON RUN</h1>
        <p style="margin-bottom: 15px; font-size: min(3.5vw, 16px);">TAP RIGHT to Jump | TAP LEFT to Slide<br>Keyboard: SPACE to Jump | DOWN to Slide</p>
        <button id="start-btn">START RUNNING</button>
        <div id="audio-status">Audio Status: Standby</div>
    </div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
</div>

<audio id="bgm" src="BART SIMP DO COPY.mp3" loop preload="auto"></audio>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const startScreen = document.getElementById("start-screen");
const startBtn = document.getElementById("start-btn");
const scoreBoard = document.getElementById("score-board");
const bgm = document.getElementById("bgm");
const audioStatus = document.getElementById("audio-status");

let gameActive = false;
let score = 0;
let gameSpeed = 6;
let obstacles = [];
let spawnTimer = 0;
let bgOffset = 0;

bgm.addEventListener('canplaythrough', () => {
    audioStatus.innerText = "Audio Status: Ready!";
    audioStatus.style.color = "#55ff55";
});

bgm.addEventListener('error', (e) => {
    audioStatus.innerText = "Audio Status: Error finding 'BART SIMP DO COPY.mp3' in same folder";
    audioStatus.style.color = "#ff5555";
});

const player = {
    x: 180,
    y: 300,
    width: 45,
    height: 70,
    originalHeight: 70,
    vy: 0,
    gravity: 1.2,
    jumpForce: -19,
    isGrounded: true,
    isSliding: false
};

const bob = {
    x: 30,
    y: 260,
    width: 60,
    height: 110
};

// Keyboard controls
window.addEventListener("keydown", (e) => {
    if (e.code === "Space" && player.isGrounded && !player.isSliding) {
        player.vy = player.jumpForce;
        player.isGrounded = false;
    }
    if (e.code === "ArrowDown" && player.isGrounded) {
        player.isSliding = true;
        player.height = player.originalHeight / 2;
        player.y = 335;
    }
});

window.addEventListener("keyup", (e) => {
    if (e.code === "ArrowDown") {
        player.isSliding = false;
        player.height = player.originalHeight;
        player.y = 300;
    }
});

// Mobile touch controls
window.addEventListener("touchstart", (e) => {
    if (!gameActive) return;
    const touch = e.touches[0];
    const screenWidth = window.innerWidth;
    
    if (touch.clientX < screenWidth / 2) {
        if (player.isGrounded) {
            player.isSliding = true;
            player.height = player.originalHeight / 2;
            player.y = 335;
        }
    } else {
        if (player.isGrounded && !player.isSliding) {
            player.vy = player.jumpForce;
            player.isGrounded = false;
        }
    }
});

window.addEventListener("touchend", () => {
    if (!gameActive) return;
    player.isSliding = false;
    player.height = player.originalHeight;
    player.y = 300;
});

startBtn.addEventListener("click", () => {
    startScreen.style.display = "none";
    gameActive = true;
    score = 0;
    gameSpeed = 6;
    obstacles = [];
    player.y = 300;
    player.vy = 0;
    player.isGrounded = true;
    
    bgm.currentTime = 0;
    bgm.play().catch(e => {
        console.log("Audio play blocked", e);
    });
    
    animate();
});

class Obstacle {
    constructor(type) {
        this.type = type; 
        this.x = canvas.width;
        
        if (type === 'spike') {
            this.width = 40;
            this.height = 40;
            this.y = 330;
        } else if (type === 'double-spike') {
            this.width = 80;
            this.height = 40;
            this.y = 330;
        } else if (type === 'triple-spike') {
            this.width = 120;
            this.height = 40;
            this.y = 330;
        } else if (type === 'double-block') {
            this.width = 120;
            this.height = 45;
            this.y = 250;
        } else { // single block
            this.width = 60;
            this.height = 45;
            this.y = 250; 
        }
    }

    update() {
        this.x -= gameSpeed;
    }

    draw() {
        if (this.type.includes('spike')) {
            ctx.fillStyle = "#7A7A7A";
            let spikeCount = 1;
            if (this.type === 'double-spike') spikeCount = 2;
            if (this.type === 'triple-spike') spikeCount = 3;
            
            let singleSpikeWidth = this.width / spikeCount;
            
            for (let i = 0; i < spikeCount; i++) {
                let startX = this.x + (i * singleSpikeWidth);
                ctx.beginPath();
                ctx.moveTo(startX, this.y + this.height);
                ctx.lineTo(startX + singleSpikeWidth / 2, this.y);
                ctx.lineTo(startX + singleSpikeWidth, this.y + this.height);
                ctx.closePath();
                ctx.fill();
                
                ctx.strokeStyle = "#FFF";
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(startX, this.y + this.height);
                ctx.lineTo(startX + singleSpikeWidth / 2, this.y);
                ctx.stroke();
            }
        } else {
            ctx.fillStyle = "#8B5A2B";
            ctx.fillRect(this.x, this.y, this.width, this.height);
            ctx.strokeStyle = "#5C3A21";
            ctx.lineWidth = 3;
            ctx.strokeRect(this.x, this.y, this.width, this.height);
            
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x + this.width, this.y + this.height);
            if (this.type === 'double-block') {
                ctx.moveTo(this.x + this.width / 2, this.y);
                ctx.lineTo(this.x + this.width / 2, this.y + this.height);
            }
            ctx.stroke();
        }
    }
}

function spawnObstacle() {
    spawnTimer++;
    
    let minGap = Math.max(40, 120 - (score * 0.15) - (gameSpeed * 1.3));
    let randomBuffer = Math.max(25, 90 - (score * 0.1));
    
    if (spawnTimer > minGap + Math.random() * randomBuffer) {
        let pool = ['spike', 'block'];
        
        // Add harder types as score rises
        if (score >= 100) {
            pool.push('double-spike');
        }
        if (score >= 250) {
            pool.push('double-block');
        }
        if (score >= 400) {
            pool.push('triple-spike');
        }
        
        const type = pool[Math.floor(Math.random() * pool.length)];
        obstacles.push(new Obstacle(type));
        spawnTimer = 0;
    }
}

function checkCollision(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width &&
           rect1.x + rect1.width > rect2.x &&
           rect1.y < rect2.y + rect2.height &&
           rect1.y + rect1.height > rect2.y;
}

function gameOver() {
    gameActive = false;
    bgm.pause();
    startScreen.style.display = "flex";
    document.querySelector("#start-screen h1").innerText = "BOB CAUGHT YOU!";
    startBtn.innerText = "TRY AGAIN";
}

function drawBackground() {
    ctx.fillStyle = "#5C94FC";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
    let cloudOffset = (bgOffset * 0.2) % 800;
    for (let i = 0; i < 2; i++) {
        let cx = 100 + i * 400 - cloudOffset;
        if (cx < -150) cx += 800;
        ctx.beginPath();
        ctx.arc(cx, 80, 30, 0, Math.PI * 2);
        ctx.arc(cx + 40, 70, 40, 0, Math.PI * 2);
        ctx.arc(cx + 80, 80, 30, 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.fillStyle = "#41924B";
    let hillOffset = (bgOffset * 0.5) % 800;
    ctx.beginPath();
    ctx.moveTo(0 - hillOffset, 370);
    ctx.quadraticCurveTo(200 - hillOffset, 250, 400 - hillOffset, 370);
    ctx.quadraticCurveTo(600 - hillOffset, 220, 800 - hillOffset, 370);
    ctx.quadraticCurveTo(1000 - hillOffset, 250, 1200 - hillOffset, 370);
    ctx.lineTo(canvas.width, canvas.height);
    ctx.lineTo(0, canvas.height);
    ctx.fill();

    ctx.fillStyle = "#737578";
    ctx.fillRect(0, 350, canvas.width, 50);
    ctx.fillStyle = "#EAEAEA";
    ctx.fillRect(0, 350, canvas.width, 6);
}

function drawBart(x, y, w, h, sliding) {
    ctx.save();
    ctx.fillStyle = "#FFD90F";
    if (!sliding) {
        ctx.beginPath();
        ctx.moveTo(x, y + 25);
        for (let i = 0; i < 9; i++) {
            let px = x + (w / 9) * i;
            let py = (i % 2 === 0) ? y - 2 : y + 3;
            ctx.lineTo(px, py);
        }
        ctx.lineTo(x + w, y + 25);
        ctx.lineTo(x + w, y + 35);
        ctx.lineTo(x, y + 35);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "#FFF";
        ctx.beginPath();
        ctx.arc(x + w - 12, y + 18, 6, 0, Math.PI * 2);
        ctx.arc(x + w - 3, y + 18, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#000";
        ctx.fillRect(x + w - 10, y + 17, 2, 2);
        ctx.fillRect(x + w - 2, y + 17, 2, 2);

        ctx.fillStyle = "#F14B32";
        ctx.fillRect(x + 5, y + 32, w - 10, 23);

        ctx.fillStyle = "#004BFF";
        ctx.fillRect(x + 5, y + 55, w - 10, 10);

        ctx.fillStyle = "#FFD90F";
        ctx.fillRect(x + 10, y + 65, 8, 5);
        ctx.fillRect(x + w - 18, y + 65, 8, 5);
    } else {
        ctx.beginPath();
        ctx.moveTo(x, y + 15);
        for (let i = 0; i < 9; i++) {
            let px = x + (w / 9) * i;
            let py = (i % 2 === 0) ? y - 2 : y + 3;
            ctx.lineTo(px, py);
        }
        ctx.lineTo(x + w, y + 15);
        ctx.lineTo(x + w, y + 25);
        ctx.lineTo(x, y + 25);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "#FFF";
        ctx.beginPath();
        ctx.arc(x + w - 12, y + 12, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#000";
        ctx.fillRect(x + w - 10, y + 11, 2, 2);

        ctx.fillStyle = "#F14B32";
        ctx.fillRect(x - 5, y + 20, w, 15);
        ctx.fillStyle = "#004BFF";
        ctx.fillRect(x - 15, y + 22, 12, 13);
    }
    ctx.restore();
}

function drawSideshowBob(x, y, w, h) {
    ctx.save();
    ctx.fillStyle = "#D6221D";
    ctx.beginPath();
    ctx.moveTo(x + w / 2, y + 40);
    ctx.quadraticCurveTo(x - 30, y + 10, x - 25, y - 25);
    ctx.quadraticCurveTo(x - 10, y + 15, x + 10, y + 30);
    ctx.quadraticCurveTo(x + w / 2, y - 45, x + w / 2 + 5, y - 45);
    ctx.quadraticCurveTo(x + w / 2 + 10, y + 20, x + w - 10, y + 30);
    ctx.quadraticCurveTo(x + w + 30, y + 10, x + w + 25, y - 25);
    ctx.quadraticCurveTo(x + w + 10, y + 15, x + w / 2, y + 40);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#FFD90F";
    ctx.fillRect(x + 10, y + 35, w - 20, 30);

    ctx.fillStyle = "#FFF";
    ctx.beginPath();
    ctx.arc(x + w - 25, y + 48, 7, 0, Math.PI * 2);
    ctx.arc(x + w - 13, y + 48, 7, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = "#000";
    ctx.beginPath();
    ctx.arc(x + w - 23, y + 48, 2, 0, Math.PI * 2);
    ctx.arc(x + w - 15, y + 48, 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "#000";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x + w - 20, y + 58, 8, 0, Math.PI, false);
    ctx.stroke();

    ctx.fillStyle = "#008543";
    ctx.fillRect(x + 5, y + 65, w - 10, 45);

    ctx.fillStyle = "#004BFF";
    ctx.fillRect(x + 8, y + 100, w - 16, 10);
    ctx.restore();
}

function animate() {
    if (!gameActive) return;

    bgOffset += gameSpeed;
    drawBackground();

    player.vy += player.gravity;
    player.y += player.vy;

    const currentGround = 350 - player.height;
    if (player.y >= currentGround) {
        player.y = currentGround;
        player.vy = 0;
        player.isGrounded = true;
    }

    bob.y = 240 + Math.sin(Date.now() * 0.015) * 8;

    drawSideshowBob(bob.x, bob.y, bob.width, bob.height);
    drawBart(player.x, player.y, player.width, player.height, player.isSliding);

    spawnObstacle();
    for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].update();
        obstacles[i].draw();

        if (checkCollision(player, obstacles[i])) {
            gameOver();
            return;
        }

        if (obstacles[i].x + obstacles[i].width < 0) {
            obstacles.splice(i, 1);
            score += 10;
            scoreBoard.innerText = "SCORE: " + score;
            gameSpeed += 0.35; 
        }
    }

    requestAnimationFrame(animate);
}
</script>

</body>
</html>
