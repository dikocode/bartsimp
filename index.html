<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bart Escape</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: #fff;
            font-family: 'Arial Black', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 400px;
        }
        canvas {
            background: #222;
            border: 4px solid #fff;
            display: block;
        }
        #score-board {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            text-shadow: 2px 2px #000;
            z-index: 10;
        }
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 800px;
            height: 400px;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        button {
            padding: 15px 40px;
            font-size: 24px;
            font-family: inherit;
            background: #FFD90F;
            color: #000;
            border: none;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.2s;
        }
        button:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="score-board">SCORE: 0</div>
    <div id="start-screen">
        <h1 style="color: #FFD90F; margin-bottom: 20px;">BART SIMPSON RUN</h1>
        <p style="margin-bottom: 20px; font-size: 18px;">SPACE to Jump (Spikes) | DOWN ARROW to Slide (Blocks)</p>
        <button id="start-btn">START RUNNING</button>
    </div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
</div>

<audio id="bgm" src="bartsimpfunk.mp4" loop></audio>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const startScreen = document.getElementById("start-screen");
const startBtn = document.getElementById("start-btn");
const scoreBoard = document.getElementById("score-board");
const bgm = document.getElementById("bgm");

let gameActive = false;
let score = 0;
let gameSpeed = 6;
let obstacles = [];
let spawnTimer = 0;

const player = {
    x: 150,
    y: 300,
    width: 40,
    height: 60,
    originalHeight: 60,
    color: "#FFD90F", // Bart Yellow
    vy: 0,
    gravity: 1.2,
    jumpForce: -18,
    isGrounded: true,
    isSliding: false
};

const bob = {
    x: 20,
    y: 280,
    width: 50,
    height: 80,
    color: "#007F3E" // Bob Green hair / clothes
};

const keys = {};

window.addEventListener("keydown", (e) => {
    keys[e.code] = true;
    if (e.code === "Space" && player.isGrounded && !player.isSliding) {
        player.vy = player.jumpForce;
        player.isGrounded = false;
    }
    if (e.code === "ArrowDown" && player.isGrounded) {
        player.isSliding = true;
        player.height = player.originalHeight / 2;
        player.y = 330;
    }
});

window.addEventListener("keyup", (e) => {
    keys[e.code] = false;
    if (e.code === "ArrowDown") {
        player.isSliding = false;
        player.height = player.originalHeight;
        player.y = 300;
    }
});

startBtn.addEventListener("click", () => {
    startScreen.style.display = "none";
    gameActive = true;
    score = 0;
    gameSpeed = 6;
    obstacles = [];
    player.y = 300;
    player.vy = 0;
    player.isGrounded = true;
    bgm.play().catch(e => console.log("Audio play blocked, click inside window first"));
    animate();
});

class Obstacle {
    constructor(type) {
        this.type = type; // 'spike' or 'block'
        this.x = canvas.width;
        if (type === 'spike') {
            this.width = 30;
            this.height = 30;
            this.y = 330;
        } else {
            this.width = 50;
            this.height = 50;
            this.y = 270; // Floating block you must slide under
        }
    }

    update() {
        this.x -= gameSpeed;
    }

    draw() {
        if (this.type === 'spike') {
            ctx.fillStyle = "#FF3B30";
            ctx.beginPath();
            ctx.moveTo(this.x, this.y + this.height);
            ctx.lineTo(this.x + this.width / 2, this.y);
            ctx.lineTo(this.x + this.width, this.y + this.height);
            ctx.closePath();
            ctx.fill();
        } else {
            ctx.fillStyle = "#007AFF";
            ctx.fillRect(this.x, this.y, this.width, this.height);
        }
    }
}

function spawnObstacle() {
    spawnTimer++;
    let minGap = Math.max(50, 120 - gameSpeed * 2);
    if (spawnTimer > minGap + Math.random() * 80) {
        const type = Math.random() > 0.5 ? 'spike' : 'block';
        obstacles.push(new Obstacle(type));
        spawnTimer = 0;
    }
}

function checkCollision(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width &&
           rect1.x + rect1.width > rect2.x &&
           rect1.y < rect2.y + rect2.height &&
           rect1.y + rect1.height > rect2.y;
}

function gameOver() {
    gameActive = false;
    startScreen.style.display = "flex";
    document.querySelector("#start-screen h1").innerText = "BOB CAUGHT YOU!";
    startBtn.innerText = "TRY AGAIN";
}

function animate() {
    if (!gameActive) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw Ground
    ctx.fillStyle = "#444";
    ctx.fillRect(0, 360, canvas.width, 40);

    // Physics
    player.vy += player.gravity;
    player.y += player.vy;

    const currentGround = 360 - player.height;
    if (player.y >= currentGround) {
        player.y = currentGround;
        player.vy = 0;
        player.isGrounded = true;
    }

    // Dynamic Bob visual bobbing
    bob.y = 280 + Math.sin(Date.now() * 0.01) * 10;

    // Draw Sideshow Bob
    ctx.fillStyle = bob.color;
    ctx.fillRect(bob.x, bob.y, bob.width, bob.height);
    // Draw wild hair top
    ctx.fillStyle = "#FF3B30";
    ctx.fillRect(bob.x - 10, bob.y - 15, bob.width + 20, 20);

    // Draw Bart
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);
    // Bart blue shorts/shirt
    ctx.fillStyle = "#007AFF";
    ctx.fillRect(player.x, player.y + player.height - 15, player.width, 15);

    // Manage Obstacles
    spawnObstacle();
    for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].update();
        obstacles[i].draw();

        if (checkCollision(player, obstacles[i])) {
            gameOver();
            return;
        }

        if (obstacles[i].x + obstacles[i].width < 0) {
            obstacles.splice(i, 1);
            score += 10;
            scoreBoard.innerText = "SCORE: " + score;
            // Ramp up speed
            gameSpeed += 0.25;
        }
    }

    requestAnimationFrame(animate);
}
</script>

</body>
</html>
